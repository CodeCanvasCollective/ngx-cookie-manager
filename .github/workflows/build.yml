name: Build, Test and Publish

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ] # Triggers on tags like v1.0.0, v1.1.0, etc.
  pull_request:
    branches: [ master, main ]

# Required for Trusted Publishing (OIDC)
permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        
    - name: Install dependencies
      run: npm install
      
    - name: Lint
      run: npm run lint --if-present
      
    - name: Build Library
      run: npm run build
      
    - name: Run Tests
      run: npm run test -- --watch=false --browsers=ChromeHeadless

    # Publish to NPM only when a tag starting with 'v' is pushed
    - name: Publish to NPM
      if: startsWith(github.ref, 'refs/tags/v')
      run: npm publish ./dist/ngx-cookie-manager --provenance --access public
